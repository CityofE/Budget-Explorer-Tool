document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

2b; text-transform: uppercase; flex: 1;\">Budget, in plain view<\u002Fdiv>\n      <nav class=\"noprint\" style=\"display: flex; gap: 2px; font-size: 13px; font-weight: 600;\">\n        <a class=\"navlink\" href=\"#glance\" style=\"color: #5a514b; text-decoration: none; padding: 7px 11px; border-radius: 7px;\">Overview<\u002Fa>\n        <a class=\"navlink\" href=\"#revenue\" style=\"color: #5a514b; text-decoration: none; padding: 7px 11px; border-radius: 7px;\">Revenue<\u002Fa>\n        <a class=\"navlink\" href=\"#spending\" style=\"color: #5a514b; text-decoration: none; padding: 7px 11px; border-radius: 7px;\">Spending<\u002Fa>\n        <a class=\"navlink\" href=\"#reserves\" style=\"color: #5a514b; text-decoration: none; padding: 7px 11px; border-radius: 7px;\">Reserves<\u002Fa>\n        <a class=\"navlink\" href=\"#outlook\" style=\"color: #5a514b; text-decoration: none; padding: 7px 11px; border-radius: 7px;\">Outlook<\u002Fa>\n        <a class=\"navlink\" href=\"#fees\" style=\"color: #5a514b; text-decoration: none; padding: 7px 11px; border-radius: 7px;\">Fees<\u002Fa>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div class=\"noprint\" style=\"position: fixed; right: 24px; bottom: 24px; z-index: 60; display: flex; align-items: center; gap: 10px; background: #15323a; border-radius: 13px; padding: 8px 10px 8px 16px; box-shadow: 0 8px 28px rgba(0,0,0,.28); opacity: {{ floatOpacity }}; transform: {{ floatTransform }}; pointer-events: {{ floatPointer }}; transition: opacity .25s ease, transform .25s ease;\">\n    <span style=\"font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: #aebfba; white-space: nowrap;\">Viewing<\u002Fspan>\n    <div style=\"display: inline-flex; background: rgba(255,255,255,.08); border-radius: 9px; padding: 3px; gap: 3px;\">\n      <button onclick=\"{{ setActual }}\" style=\"border: none; cursor: pointer; font-family: 'Public Sans', sans-serif; font-size: 13px; font-weight: 600; padding: 7px 13px; border-radius: 6px; background: {{ floatActualBg }}; color: {{ floatActualFg }}; white-space: nowrap;\">FY26 Actual<\u002Fbutton>\n      <button onclick=\"{{ setBudget }}\" style=\"border: none; cursor: pointer; font-family: 'Public Sans', sans-serif; font-size: 13px; font-weight: 600; padding: 7px 13px; border-radius: 6px; background: {{ floatBudgetBg }}; color: {{ floatBudgetFg }}; white-space: nowrap;\">FY27 Budget<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <main style=\"max-width: 1080px; margin: 0 auto; padding: 0 28px 80px;\">\n\n    <!-- ===================== AT A GLANCE ===================== -->\n    <section id=\"glance\" style=\"padding: 32px 0 8px; scroll-margin-top: 80px;\">\n      <div style=\"display: flex; gap: 12px; align-items: flex-start; background: #faf4ef; border: 1px solid #ecdcd2; border-left: 3px solid #8c1f2b; border-radius: 10px; padding: 14px 18px; margin-bottom: 36px;\">\n        <span style=\"font-family: 'Spectral', serif; font-weight: 700; color: #8c1f2b; font-size: 14px; flex: none; line-height: 1.5;\">Advisory<\u002Fspan>\n        <p style=\"font-size: 13px; line-height: 1.55; color: #6b635c; margin: 0;\">This explorer is a plain-language companion to the City’s financial reports. Figures come from Evanston’s own fund statements and its audited results for the year ended June 30, 2025; the five-year outlook is a planning tool, not a prediction. It is <strong style=\"color:#4a423c;\">advisory only<\u002Fstrong> and is not an official budget document or audited financial statement. For official figures, refer to the City’s adopted budget and Annual Comprehensive Financial Report.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"font-size: 13px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: #8c1f2b;\">A citizen’s guide to the city budget<\u002Fdiv>\n      <h1 style=\"font-family: 'Spectral', serif; font-weight: 600; font-size: 44px; line-height: 1.08; margin: 12px 0 14px; max-width: 18ch;\">Where Evanston’s money comes from and where it is spent<\u002Fh1>\n      <p style=\"font-size: 17px; line-height: 1.6; color: #5a514b; max-width: 62ch; margin: 0 0 28px;\">This is the City’s General Fund — the money that pays for police, streets, parks and day‑to‑day services — explained for residents, staff and Council. Switch between what the City actually collected last year and what it has budgeted for the year ahead, then explore every piece for yourself.<\u002Fp>\n\n      <div class=\"noprint\" style=\"display: inline-flex; background: #fff; border: 1px solid #e6e1d8; border-radius: 10px; padding: 4px; gap: 4px; margin-bottom: 32px;\">\n        <button onclick=\"{{ setActual }}\" style=\"border: none; cursor: pointer; font-family: 'Public Sans', sans-serif; font-size: 14px; font-weight: 600; padding: 9px 16px; border-radius: 7px; background: {{ actualBg }}; color: {{ actualFg }};\">FY2025–26 Actual<\u002Fbutton>\n        <button onclick=\"{{ setBudget }}\" style=\"border: none; cursor: pointer; font-family: 'Public Sans', sans-serif; font-size: 14px; font-weight: 600; padding: 9px 16px; border-radius: 7px; background: {{ budgetBg }}; color: {{ budgetFg }};\">FY2026–27 Budget<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;\">\n        <div style=\"background: #fff; border: 1px solid #e7e2d9; border-radius: 14px; padding: 22px;\">\n          <div style=\"font-size: 12px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: #968b81;\">General Fund revenue<\u002Fdiv>\n          <div style=\"font-family: 'Spectral', serif; font-size: 34px; font-weight: 600; margin: 8px 0 2px; color: #241f1d;\">{{ heroTotal }}<\u002Fdiv>\n          <div style=\"font-size: 13px; color: #6b635c;\">{{ yearLabel }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background: #fff; border: 1px solid #e7e2d9; border-radius: 14px; padding: 22px;\">\n          <div style=\"font-size: 12px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: #968b81;\">Per resident<\u002Fdiv>\n          <div style=\"font-family: 'Spectral', serif; font-size: 34px; font-weight: 600; margin: 8px 0 2px; color: #241f1d;\">{{ heroPerResident }}<\u002Fdiv>\n          <div style=\"font-size: 13px; color: #6b635c;\">Across ~11,800 residents<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background: #fff; border: 1px solid #e7e2d9; border-radius: 14px; padding: 22px;\">\n          <div style=\"font-size: 12px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: #968b81;\">In reserve<\u002Fdiv>\n          <div style=\"font-family: 'Spectral', serif; font-size: 34px; font-weight: 600; margin: 8px 0 2px; color: #241f1d;\">$34.2M<\u002Fdiv>\n          <div style=\"font-size: 13px; color: #6b635c;\">Audited savings, June 2025<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background: #fff; border: 1px solid #e7e2d9; border-radius: 14px; padding: 22px;\">\n          <div style=\"font-size: 12px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: #968b81;\">Reserve cushion<\u002Fdiv>\n          <div style=\"font-family: 'Spectral', serif; font-size: 34px; font-weight: 600; margin: 8px 0 2px; color: #241f1d;\">~25 mo<\u002Fdiv>\n          <div style=\"font-size: 13px; color: #6b635c;\">Of operating costs covered<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===================== REVENUE ===================== -->\n    <section id=\"revenue\" style=\"padding: 64px 0 8px; scroll-margin-top: 80px;\">\n      <div style=\"font-size: 13px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: #8c1f2b;\">01 — Where the money comes from<\u002Fdiv>\n      <h2 style=\"font-family: 'Spectral', serif; font-weight: 600; font-size: 32px; line-height: 1.12; margin: 10px 0 10px;\">Revenue by source<\u002Fh2>\n      <p style=\"font-size: 16px; line-height: 1.6; color: #5a514b; max-width: 64ch; margin: 0 0 30px;\">Four streams — mineral royalties, state-shared revenue, local sales tax and property tax — supply most of the budget. That gives Evanston scale at low cost, but ties it to forces outside the City’s control: consumer spending and the energy cycle.<\u002Fp>\n\n      <div style=\"display: grid; grid-template-columns: 300px 1fr; gap: 40px; align-items: flex-start;\">\n        <div style=\"display: flex; flex-direction: column; align-items: center; position: sticky; top: 96px;\">\n          <div style=\"position: relative; width: 240px; height: 240px;\">\n            <div style=\"position: absolute; inset: 0; border-radius: 50%; background: {{ donut }};\"><\u002Fdiv>\n            <div style=\"position: absolute; inset: 30px; border-radius: 50%; background: #f2f0ea; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 14px; text-align: center;\">\n              <div style=\"font-size: 10.5px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: #968b81; line-height: 1.3;\">{{ donutLabel }}<\u002Fdiv>\n              <div style=\"font-family: 'Spectral', serif; font-size: 24px; font-weight: 600; margin: 3px 0 1px;\">{{ donutValue }}<\u002Fdiv>\n              <div style=\"font-size: 11px; color: #968b81;\">{{ donutSub }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n          <sc-for list=\"{{ revRows }}\" as=\"r\" hint-placeholder-count=\"7\">\n            <div style=\"display: flex; flex-direction: column; gap: 6px;\">\n              <div onclick=\"{{ r.onToggle }}\" style=\"display: flex; align-items: baseline; gap: 10px; cursor: pointer; opacity: {{ r.rowOpacity }}; transition: opacity .2s ease;\">\n                <span style=\"width: 11px; height: 11px; border-radius: 3px; background: {{ r.color }}; flex: none; box-shadow: {{ r.dotRing }}; transition: box-shadow .2s ease;\"><\u002Fspan>\n                <span style=\"font-size: 14px; font-weight: 600; color: #2a2320;\">{{ r.name }}<\u002Fspan>\n                <span style=\"font-size: 10px; color: #a89f94; flex: none;\">{{ r.chevron }}<\u002Fspan>\n                <span style=\"flex: 1;\"><\u002Fspan>\n                <span style=\"font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums;\">{{ r.amount }}<\u002Fspan>\n                <span style=\"font-size: 12px; color: #968b81; width: 34px; text-align: right; font-variant-numeric: tabular-nums;\">{{ r.pct }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"height: 7px; background: #e7e2d9; border-radius: 5px; overflow: hidden; margin-left: 21px; opacity: {{ r.rowOpacity }}; transition: opacity .2s ease;\">\n                <div style=\"height: 100%; width: {{ r.barPct }}; background: {{ r.color }}; border-radius: 5px;\"><\u002Fdiv>\n              <\u002Fdiv>\n              <sc-if value=\"{{ r.open }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"margin: 4px 0 6px 21px; padding: 13px 15px; background: #faf7f2; border: 1px solid #efe9df; border-radius: 9px;\">\n                  <p style=\"margin: 0 0 4px; font-size: 12.5px; color: #756d65; line-height: 1.5;\">{{ r.note }}<\u002Fp>\n                  <sc-for list=\"{{ r.children }}\" as=\"ch\" hint-placeholder-count=\"2\">\n                    <div style=\"display: flex; align-items: baseline; gap: 10px; padding: 7px 0 0; margin-top: 7px; border-top: 1px solid #efe9df;\">\n                      <span style=\"font-size: 13px; color: #3a322e;\">{{ ch.name }}<\u002Fspan>\n                      <span style=\"flex: 1;\"><\u002Fspan>\n                      <span style=\"font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums;\">{{ ch.amount }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <div class=\"noprint\" style=\"font-size: 12px; color: #a89f94; margin-top: 4px;\">Tap any source to see the line items inside it.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===================== SPENDING / FUNDS ===================== -->\n    <section id=\"spending\" style=\"padding: 64px 0 8px; scroll-margin-top: 80px;\">\n      <div style=\"font-size: 13px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: #8c1f2b;\">02 — Where the money goes<\u002Fdiv>\n      <div style=\"display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin: 10px 0 10px;\">\n        <h2 style=\"font-family: 'Spectral', serif; font-weight: 600; font-size: 32px; line-height: 1.12; margin: 0;\">The City’s funds<\u002Fh2>\n        <span style=\"font-size: 12px; font-weight: 700; letter-spacing: .04em; color: #8c1f2b; background: #f7ece8; border: 1px solid #ecdcd2; padding: 5px 11px; border-radius: 20px; white-space: nowrap;\">Showing: {{ fundsYearLabel }}<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"font-size: 16px; line-height: 1.6; color: #5a514b; max-width: 64ch; margin: 0 0 18px;\">Beyond the General Fund, the City runs separate funds for water, sewer, trash, golf and more. Each line shows revenue against spending for the selected year — use the <strong>Actual / Budget<\u002Fstrong> toggle at the top to switch. Where spending tops revenue, the gap is covered by savings — usually for one-time capital projects like water lines or street overlays.<\u002Fp>\n      <div style=\"display: flex; gap: 22px; margin-bottom: 22px; font-size: 13px; color: #6b635c;\">\n        <span style=\"display: inline-flex; align-items: center; gap: 7px;\"><span style=\"width: 12px; height: 12px; border-radius: 3px; background: #3f8780;\"><\u002Fspan>{{ revLegend }}<\u002Fspan>\n        <span style=\"display: inline-flex; align-items: center; gap: 7px;\"><span style=\"width: 12px; height: 12px; border-radius: 3px; background: #c9a96a;\"><\u002Fspan>{{ expLegend }}<\u002Fspan>\n        <span style=\"flex: 1;\"><\u002Fspan>\n        <span style=\"font-size: 12px; color: #968b81;\">All figures {{ fundsYearShort }}<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"display: flex; flex-direction: column; gap: 20px;\">\n        <sc-for list=\"{{ fundRows }}\" as=\"f\" hint-placeholder-count=\"8\">\n          <div style=\"background: #fff; border: 1px solid #e7e2d9; border-radius: 14px; padding: 18px 22px;\">\n            <div style=\"display: flex; align-items: baseline; gap: 12px; margin-bottom: 12px;\">\n              <span style=\"font-family: 'Spectral', serif; font-size: 18px; font-weight: 600;\">{{ f.name }}<\u002Fspan>\n              <span style=\"flex: 1; font-size: 13px; color: #968b81;\">{{ f.plain }}<\u002Fspan>\n              <span style=\"font-size: 13px; font-weight: 700; color: {{ f.netColor }}; font-variant-numeric: tabular-nums;\">{{ f.net }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display: flex; align-items: center; gap: 12px; margin-bottom: 7px;\">\n              <span style=\"width: 64px; font-size: 12px; color: #968b81;\">Revenue<\u002Fspan>\n              <div style=\"flex: 1; height: 12px; background: #f4f1ea; border-radius: 6px; overflow: hidden;\"><div style=\"height: 100%; width: {{ f.revBar }}; background: #3f8780; border-radius: 6px;\"><\u002Fdiv><\u002Fdiv>\n              <span style=\"width: 110px; text-align: right; font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums;\">{{ f.rev }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display: flex; align-items: center; gap: 12px;\">\n              <span style=\"width: 64px; font-size: 12px; color: #968b81;\">Spending<\u002Fspan>\n              <div style=\"flex: 1; height: 12px; background: #f4f1ea; border-radius: 6px; overflow: hidden;\"><div style=\"height: 100%; width: {{ f.expBar }}; background: #c9a96a; border-radius: 6px;\"><\u002Fdiv><\u002Fdiv>\n              <span style=\"width: 110px; text-align: right; font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums;\">{{ f.exp }}<\u002Fspan>\n            <\u002Fdiv>\n            <sc-if value=\"{{ f.hasCapital }}\" hint-placeholder-val=\"{{ false }}\">\n              <div onclick=\"{{ f.onToggleCap }}\" style=\"display: flex; align-items: center; gap: 7px; margin: 12px 0 0 76px; cursor: pointer; font-size: 12.5px; font-weight: 600; color: #8c1f2b;\">\n                <span style=\"font-size: 10px;\">{{ f.capChevron }}<\u002Fspan>\n                <span>{{ f.capLabel }}<\u002Fspan>\n              <\u002Fdiv>\n              <sc-if value=\"{{ f.capOpen }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"margin: 10px 0 2px 76px; padding: 14px 16px; background: #faf7f2; border: 1px solid #efe9df; border-radius: 9px;\">\n                  <p style=\"margin: 0 0 8px; font-size: 12px; color: #968b81; line-height: 1.5;\">Major one-time projects in the FY27 adopted capital budget. Large multi-year projects are fully appropriated up front, then phased over several years — which is why budgeted spending can run ahead of revenue.<\u002Fp>\n                  <sc-for list=\"{{ f.capProjects }}\" as=\"p\" hint-placeholder-count=\"3\">\n                    <div style=\"display: flex; align-items: baseline; gap: 10px; padding: 8px 0 0; margin-top: 8px; border-top: 1px solid #efe9df;\">\n                      <span style=\"font-size: 13.5px; color: #3a322e;\">{{ p.name }}<\u002Fspan>\n                      <span style=\"flex: 1;\"><\u002Fspan>\n                      <span style=\"font-size: 13.5px; font-weight: 600; font-variant-numeric: tabular-nums;\">{{ p.cost }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                  <div style=\"display: flex; align-items: baseline; gap: 10px; padding: 9px 0 0; margin-top: 9px; border-top: 1.5px solid #ddd5c9;\">\n                    <span style=\"font-size: 13px; font-weight: 700; color: #241f1d;\">Total capital program<\u002Fspan>\n                    <span style=\"flex: 1;\"><\u002Fspan>\n                    <span style=\"font-size: 13.5px; font-weight: 700; color: #8c1f2b; font-variant-numeric: tabular-nums;\">{{ f.capTotal }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ f.hasBreakdown }}\" hint-placeholder-val=\"{{ false }}\">\n              <div onclick=\"{{ f.onToggleCap }}\" style=\"display: flex; align-items: center; gap: 7px; margin: 12px 0 0 76px; cursor: pointer; font-size: 12.5px; font-weight: 600; color: #8c1f2b;\">\n                <span style=\"font-size: 10px;\">{{ f.bdChevron }}<\u002Fspan>\n                <span>{{ f.bdLabel }}<\u002Fspan>\n              <\u002Fdiv>\n              <sc-if value=\"{{ f.bdOpen }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"margin: 10px 0 2px 76px; padding: 14px 16px; background: #faf7f2; border: 1px solid #efe9df; border-radius: 9px;\">\n                  <p style=\"margin: 0 0 4px; font-size: 12px; color: #968b81; line-height: 1.5;\">How the fund’s FY2025–26 spending divides across departments, capital projects and community grants. Each share is a percentage of the fund’s total spending.<\u002Fp>\n                  <sc-for list=\"{{ f.breakdownGroups }}\" as=\"grp\" hint-placeholder-count=\"3\">\n                    <div style=\"margin-top: 14px;\">\n                      <div style=\"display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px;\">\n                        <span style=\"width: 9px; height: 9px; border-radius: 2px; background: {{ grp.color }}; flex: none;\"><\u002Fspan>\n                        <span style=\"font-size: 11px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: #756d65;\">{{ grp.label }}<\u002Fspan>\n                        <span style=\"flex: 1;\"><\u002Fspan>\n                        <span style=\"font-size: 12px; font-weight: 700; color: #3a322e; font-variant-numeric: tabular-nums;\">{{ grp.subPct }}<\u002Fspan>\n                        <span style=\"font-size: 11px; color: #a89f94; font-variant-numeric: tabular-nums;\">{{ grp.subAmount }}<\u002Fspan>\n                      <\u002Fdiv>\n                      <sc-for list=\"{{ grp.items }}\" as=\"it\" hint-placeholder-count=\"4\">\n                        <div style=\"display: flex; flex-direction: column; gap: 3px; margin: 0 0 7px 17px;\">\n                          <div style=\"display: flex; align-items: baseline; gap: 10px;\">\n                            <span style=\"font-size: 13px; color: #3a322e;\">{{ it.name }}<\u002Fspan>\n                            <span style=\"flex: 1;\"><\u002Fspan>\n                            <span style=\"font-size: 12.5px; font-weight: 600; color: #241f1d; font-variant-numeric: tabular-nums;\">{{ it.pct }}<\u002Fspan>\n                            <span style=\"font-size: 11.5px; color: #a89f94; font-variant-numeric: tabular-nums; min-width: 86px; text-align: right;\">{{ it.amount }}<\u002Fspan>\n                          <\u002Fdiv>\n                          <div style=\"height: 5px; background: #ece6dc; border-radius: 4px; overflow: hidden;\">\n                            <div style=\"height: 100%; width: {{ it.barPct }}; background: {{ it.color }}; border-radius: 4px;\"><\u002Fdiv>\n                          <\u002Fdiv>\n                        <\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <h3 style=\"font-family: 'Spectral', serif; font-weight: 600; font-size: 22px; margin: 44px 0 6px;\">Do the City’s services pay for themselves?<\u002Fh3>\n      <p style=\"font-size: 16px; line-height: 1.6; color: #5a514b; max-width: 64ch; margin: 0 0 24px;\">Some funds are meant to run on the fees they charge. This shows how much of each one’s operating cost is covered by its own revenue. Above 100% means it runs a surplus; below means other City money helps cover it.<\u002Fp>\n\n      <div style=\"display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;\">\n        <sc-for list=\"{{ recRows }}\" as=\"r\" hint-placeholder-count=\"6\">\n          <div style=\"background: #fff; border: 1px solid #e7e2d9; border-radius: 14px; padding: 18px 20px;\">\n            <div style=\"display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 9px;\">\n              <span style=\"font-size: 15px; font-weight: 600;\">{{ r.name }}<\u002Fspan>\n              <span style=\"font-family: 'Spectral', serif; font-size: 22px; font-weight: 600; color: {{ r.color }};\">{{ r.pct }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"height: 9px; background: #f4f1ea; border-radius: 6px; overflow: hidden; position: relative; margin-bottom: 9px;\">\n              <div style=\"position: absolute; left: 100%; top: -3px; bottom: -3px; width: 1.5px; background: #c8bfb2;\"><\u002Fdiv>\n              <div style=\"height: 100%; width: {{ r.barPct }}; background: {{ r.color }}; border-radius: 6px;\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size: 12.5px; color: #756d65; line-height: 1.45;\">{{ r.plain }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===================== RESERVES ===================== -->\n    <section id=\"reserves\" style=\"padding: 64px 0 8px; scroll-margin-top: 80px;\">\n      <div style=\"font-size: 13px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: #8c1f2b;\">03 — The City’s savings<\u002Fdiv>\n      <h2 style=\"font-family: 'Spectral', serif; font-weight: 600; font-size: 32px; line-height: 1.12; margin: 10px 0 10px;\">Reserves &amp; fund balance<\u002Fh2>\n      <p style=\"font-size: 16px; line-height: 1.6; color: #5a514b; max-width: 64ch; margin: 0 0 30px;\">At June 30, 2025 the audited General Fund held <strong>$34.2 million<\u002Fstrong> in reserve — most of it fully flexible. Think of it as the City’s savings account: it absorbs emergencies, funds big projects without borrowing, and smooths out a bad revenue year.<\u002Fp>\n\n      <div style=\"display: grid; grid-template-columns: 1.1fr 1fr; gap: 24px; align-items: stretch;\">\n        <div style=\"background: #fff; border: 1px solid #e7e2d9; border-radius: 16px; padding: 26px;\">\n          <div style=\"font-size: 12px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: #968b81; margin-bottom: 16px;\">How the $34.2M breaks down<\u002Fdiv>\n          <div style=\"display: flex; height: 26px; border-radius: 7px; overflow: hidden; margin-bottom: 18px;\">\n            <div style=\"width: 85.3%; background: #1f4d5c;\"><\u002Fdiv>\n            <div style=\"width: 14.6%; background: #5a9b7d;\"><\u002Fdiv>\n            <div style=\"width: 0.1%; background: #c9a96a;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n            <div style=\"display: flex; align-items: baseline; gap: 10px;\"><span style=\"width: 11px; height: 11px; border-radius: 3px; background: #1f4d5c;\"><\u002Fspan><span style=\"font-size: 14px; font-weight: 600;\">Unassigned<\u002Fspan><span style=\"font-size: 12px; color: #968b81;\">fully flexible<\u002Fspan><span style=\"flex: 1;\"><\u002Fspan><span style=\"font-weight: 700; font-variant-numeric: tabular-nums;\">$29.2M<\u002Fspan><\u002Fdiv>\n            <div style=\"display: flex; align-items: baseline; gap: 10px;\"><span style=\"width: 11px; height: 11px; border-radius: 3px; background: #5a9b7d;\"><\u002Fspan><span style=\"font-size: 14px; font-weight: 600;\">Assigned<\u002Fspan><span style=\"font-size: 12px; color: #968b81;\">earmarked for use<\u002Fspan><span style=\"flex: 1;\"><\u002Fspan><span style=\"font-weight: 700; font-variant-numeric: tabular-nums;\">$5.0M<\u002Fspan><\u002Fdiv>\n            <div style=\"display: flex; align-items: baseline; gap: 10px;\"><span style=\"width: 11px; height: 11px; border-radius: 3px; background: #c9a96a;\"><\u002Fspan><span style=\"font-size: 14px; font-weight: 600;\">Nonspendable<\u002Fspan><span style=\"font-size: 12px; color: #968b81;\">prepaids / inventory<\u002Fspan><span style=\"flex: 1;\"><\u002Fspan><span style=\"font-weight: 700; font-variant-numeric: tabular-nums;\">$21K<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background: #6f1822; color: #f6ece8; border-radius: 16px; padding: 26px; display: flex; flex-direction: column; justify-content: center;\">\n          <div style=\"font-size: 12px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: #e2b3ab; margin-bottom: 16px;\">How deep is the cushion?<\u002Fdiv>\n          <div style=\"display: flex; align-items: flex-end; gap: 16px; margin-bottom: 8px;\">\n            <div style=\"flex: none;\">\n              <div style=\"font-family: 'Spectral', serif; font-size: 40px; font-weight: 600; line-height: 1;\">~25<\u002Fdiv>\n              <div style=\"font-size: 12px; color: #e2b3ab;\">months Evanston holds<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex: 1; padding-bottom: 4px;\">\n              <div style=\"display: flex; align-items: flex-end; gap: 6px; height: 70px;\">\n                <div style=\"flex: 1; background: #6cb892; border-radius: 4px 4px 0 0; height: 100%;\"><\u002Fdiv>\n                <div style=\"flex: 1; background: #93434b; border-radius: 4px 4px 0 0; height: 8%;\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display: flex; gap: 6px; margin-top: 7px; font-size: 11px; color: #e2b3ab;\"><span style=\"flex: 1; text-align: center;\">Evanston<\u002Fspan><span style=\"flex: 1; text-align: center;\">Min. (2 mo)<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"font-size: 13.5px; line-height: 1.55; color: #efcfc9; margin: 12px 0 0;\">Evanston’s reserve is roughly <strong style=\"color: rgb(255, 255, 255);\">twelve times<\u002Fstrong> the two-month minimum that finance professionals recommend.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===================== OUTLOOK / FORECAST ===================== -->\n    <section id=\"outlook\" style=\"padding: 64px 0 8px; scroll-margin-top: 80px;\">\n      <div style=\"font-size: 13px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: #8c1f2b;\">04 — The five-year outlook<\u002Fdiv>\n      <h2 style=\"font-family: 'Spectral', serif; font-weight: 600; font-size: 32px; line-height: 1.12; margin: 10px 0 10px;\">Try the forecast yourself<\u002Fh2>\n      <p style=\"font-size: 16px; line-height: 1.6; color: #5a514b; max-width: 64ch; margin: 0 0 26px;\">The City’s recurring revenue is expected to soften as today’s high interest earnings and mineral money fade, while costs keep rising. That slowly squeezes the operating surplus. Move the sliders to test your own assumptions — the chart and the bottom line update live.<\u002Fp>\n\n      <div style=\"display: grid; grid-template-columns: 1.5fr 1fr; gap: 24px; align-items: start;\">\n        <div style=\"background: #fff; border: 1px solid #e7e2d9; border-radius: 16px; padding: 22px 24px;\">\n          <div style=\"display: flex; gap: 22px; margin-bottom: 8px; font-size: 12.5px; color: #6b635c;\">\n            <span style=\"display: inline-flex; align-items: center; gap: 7px;\"><span style=\"width: 16px; height: 3px; background: #3f8780; border-radius: 2px;\"><\u002Fspan>Recurring revenue<\u002Fspan>\n            <span style=\"display: inline-flex; align-items: center; gap: 7px;\"><span style=\"width: 16px; height: 3px; background: #8c1f2b; border-radius: 2px;\"><\u002Fspan>Operating cost<\u002Fspan>\n          <\u002Fdiv>\n          <svg viewBox=\"{{ fcVB }}\" style=\"width: 100%; height: auto; display: block;\" preserveAspectRatio=\"xMidYMid meet\">\n            <sc-for list=\"{{ grid }}\" as=\"g\" hint-placeholder-count=\"4\">\n              <line x1=\"56\" y1=\"{{ g.y }}\" x2=\"736\" y2=\"{{ g.y }}\" stroke=\"#f0ece4\" stroke-width=\"1\"><\u002Fline>\n              <text x=\"48\" y=\"{{ g.y }}\" text-anchor=\"end\" dominant-baseline=\"middle\" font-size=\"11\" fill=\"#a89f94\" font-family=\"Public Sans\">{{ g.label }}<\u002Ftext>\n            <\u002Fsc-for>\n            <path d=\"{{ areaPath }}\" fill=\"#3f8780\" fill-opacity=\"0.08\"><\u002Fpath>\n            <path d=\"{{ expPath }}\" fill=\"none\" stroke=\"#8c1f2b\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n            <path d=\"{{ revPath }}\" fill=\"none\" stroke=\"#3f8780\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n            <sc-for list=\"{{ expPts }}\" as=\"p\" hint-placeholder-count=\"5\"><circle cx=\"{{ p.x }}\" cy=\"{{ p.y }}\" r=\"3.5\" fill=\"#8c1f2b\"><\u002Fcircle><\u002Fsc-for>\n            <sc-for list=\"{{ revPts }}\" as=\"p\" hint-placeholder-count=\"5\"><circle cx=\"{{ p.x }}\" cy=\"{{ p.y }}\" r=\"3.5\" fill=\"#3f8780\"><\u002Fcircle><\u002Fsc-for>\n            <sc-for list=\"{{ xLabels }}\" as=\"x\" hint-placeholder-count=\"5\"><text x=\"{{ x.x }}\" y=\"288\" text-anchor=\"middle\" font-size=\"12\" fill=\"#756d65\" font-family=\"Public Sans\" font-weight=\"600\">{{ x.label }}<\u002Ftext><\u002Fsc-for>\n          <\u002Fsvg>\n\n          <div style=\"display: flex; gap: 8px; margin-top: 14px;\">\n            <sc-for list=\"{{ surplusChips }}\" as=\"c\" hint-placeholder-count=\"5\">\n              <div style=\"flex: 1; text-align: center; background: {{ c.bg }}; border-radius: 9px; padding: 9px 4px;\">\n                <div style=\"font-size: 11px; color: #968b81; font-weight: 600;\">{{ c.year }}<\u002Fdiv>\n                <div style=\"font-size: 12.5px; font-weight: 700; color: {{ c.color }}; font-variant-numeric: tabular-nums; margin-top: 2px;\">{{ c.val }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"font-size: 11.5px; color: #a89f94; text-align: center; margin-top: 8px;\">Annual operating surplus / (deficit)<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"noprint\" style=\"background: #fff; border: 1px solid #e7e2d9; border-radius: 16px; padding: 22px 24px;\">\n          <div style=\"display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 18px;\">\n            <span style=\"font-size: 12px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: #968b81;\">Your assumptions<\u002Fspan>\n            <button onclick=\"{{ resetForecast }}\" style=\"background: none; border: none; color: #8c1f2b; font-family: 'Public Sans', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; padding: 0;\">Reset<\u002Fbutton>\n          <\u002Fdiv>\n\n          <div style=\"margin-bottom: 20px;\">\n            <div style=\"display: flex; justify-content: space-between; font-size: 13.5px; margin-bottom: 7px;\"><span style=\"font-weight: 600;\">Cost growth / year<\u002Fspan><span style=\"font-weight: 700; color: #8c1f2b;\">{{ opGrowthLabel }}<\u002Fspan><\u002Fdiv>\n            <input type=\"range\" min=\"0\" max=\"7\" step=\"0.5\" value=\"{{ opGrowthPct }}\" onchange=\"{{ setOp }}\" oninput=\"{{ setOp }}\" style=\"width: 100%;\">\n          <\u002Fdiv>\n          <div style=\"margin-bottom: 20px;\">\n            <div style=\"display: flex; justify-content: space-between; font-size: 13.5px; margin-bottom: 7px;\"><span style=\"font-weight: 600;\">Interest earnings / year<\u002Fspan><span style=\"font-weight: 700; color: #2f6b72;\">{{ interestLabel }}<\u002Fspan><\u002Fdiv>\n            <input type=\"range\" min=\"-25\" max=\"10\" step=\"1\" value=\"{{ interestPct }}\" onchange=\"{{ setInt }}\" oninput=\"{{ setInt }}\" style=\"width: 100%;\">\n          <\u002Fdiv>\n          <div style=\"margin-bottom: 20px;\">\n            <div style=\"display: flex; justify-content: space-between; font-size: 13.5px; margin-bottom: 7px;\"><span style=\"font-weight: 600;\">Mineral revenue / year<\u002Fspan><span style=\"font-weight: 700; color: #2f6b72;\">{{ royaltyLabel }}<\u002Fspan><\u002Fdiv>\n            <input type=\"range\" min=\"-8\" max=\"10\" step=\"0.5\" value=\"{{ royaltyPct }}\" onchange=\"{{ setRoy }}\" oninput=\"{{ setRoy }}\" style=\"width: 100%;\">\n          <\u002Fdiv>\n          <div style=\"margin-bottom: 22px;\">\n            <div style=\"display: flex; justify-content: space-between; font-size: 13.5px; margin-bottom: 7px;\"><span style=\"font-weight: 600;\">Sales tax / year<\u002Fspan><span style=\"font-weight: 700; color: #2f6b72;\">{{ salesLabel }}<\u002Fspan><\u002Fdiv>\n            <input type=\"range\" min=\"-4\" max=\"10\" step=\"0.5\" value=\"{{ salesPct }}\" onchange=\"{{ setSales }}\" oninput=\"{{ setSales }}\" style=\"width: 100%;\">\n          <\u002Fdiv>\n\n          <div style=\"border-top: 1px solid #f2efe9; padding-top: 16px; display: flex; flex-direction: column; gap: 12px;\">\n            <div style=\"display: flex; justify-content: space-between; align-items: baseline;\"><span style=\"font-size: 13px; color: #6b635c;\">Surplus, FY27<\u002Fspan><span style=\"font-family: 'Spectral', serif; font-size: 18px; font-weight: 600;\">{{ surplus27 }}<\u002Fspan><\u002Fdiv>\n            <div style=\"display: flex; justify-content: space-between; align-items: baseline;\"><span style=\"font-size: 13px; color: #6b635c;\">Surplus, FY31<\u002Fspan><span style=\"font-family: 'Spectral', serif; font-size: 18px; font-weight: 600;\">{{ surplus31 }}<\u002Fspan><\u002Fdiv>\n            <div style=\"display: flex; justify-content: space-between; align-items: baseline;\"><span style=\"font-size: 13px; color: #6b635c;\">Reserve by FY31<\u002Fspan><span style=\"font-family: 'Spectral', serif; font-size: 18px; font-weight: 600;\">{{ reserve31 }} <span style=\"font-size:12px;color:#968b81;font-family:'Public Sans';\">({{ reserveMult }}×)<\u002Fspan><\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size: 12.5px; color: #968b81; margin: 16px 0 0; max-width: 70ch;\">A planning tool, not a prediction. Defaults follow the City’s base case: costs +4%/yr, interest earnings fading, mineral revenue declining ~2%/yr. Reserve trajectory starts from the audited $34.2M plus the FY26 result.<\u002Fp>\n    <\u002Fsection>\n\n    <!-- ===================== FEES ===================== -->\n    <section id=\"fees\" style=\"padding: 64px 0 8px; scroll-margin-top: 80px;\">\n      <div style=\"font-size: 13px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: #8c1f2b;\">05 — What does it cost?<\u002Fdiv>\n      <h2 style=\"font-family: 'Spectral', serif; font-weight: 600; font-size: 32px; line-height: 1.12; margin: 10px 0 10px;\">Fee &amp; charge lookup<\u002Fh2>\n      <p style=\"font-size: 16px; line-height: 1.6; color: #5a514b; max-width: 64ch; margin: 0 0 22px;\">Search the City’s adopted fee schedule — permits, licenses, utility rates, golf, the cemetery and more. Type to filter, or pick a category.<\u002Fp>\n\n      <input type=\"text\" value=\"{{ feeQuery }}\" oninput=\"{{ setFeeQuery }}\" placeholder=\"Search fees — e.g. dog, building permit, water…\" class=\"noprint\" style=\"width: 100%; font-family: 'Public Sans', sans-serif; font-size: 15px; padding: 13px 18px; border: 1px solid #d9d1c5; border-radius: 11px; background: #fff; color: #241f1d; outline: none; margin-bottom: 14px;\">\n\n      <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n        <sc-for list=\"{{ feeGroups }}\" as=\"g\" hint-placeholder-count=\"9\">\n          <div style=\"background: #fff; border: 1px solid #e7e2d9; border-radius: 14px; overflow: hidden;\">\n            <div onclick=\"{{ g.onToggle }}\" style=\"display: flex; align-items: center; gap: 12px; padding: 16px 22px; cursor: pointer;\">\n              <span style=\"font-family: 'Spectral', serif; font-size: 17px; font-weight: 600; color: #241f1d;\">{{ g.name }}<\u002Fspan>\n              <span style=\"font-size: 11px; font-weight: 600; color: #8c1f2b; background: #f7ece8; padding: 3px 9px; border-radius: 20px; white-space: nowrap;\">{{ g.count }}<\u002Fspan>\n              <span style=\"flex: 1;\"><\u002Fspan>\n              <span style=\"font-size: 12px; color: #a89f94;\">{{ g.chevron }}<\u002Fspan>\n            <\u002Fdiv>\n            <sc-if value=\"{{ g.open }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding: 0 0 6px;\">\n                <sc-for list=\"{{ g.items }}\" as=\"f\" hint-placeholder-count=\"6\">\n                  <div style=\"display: flex; align-items: center; gap: 14px; padding: 11px 22px; border-top: 1px solid #f4f1ea;\">\n                    <span style=\"font-size: 14.5px; color: #3a322e; flex: 1;\">{{ f.name }}<\u002Fspan>\n                    <span style=\"font-size: 14.5px; font-weight: 700; color: #241f1d; font-variant-numeric: tabular-nums; min-width: 110px; text-align: right;\">{{ f.fee }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <sc-if value=\"{{ noFees }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background: #fff; border: 1px solid #e7e2d9; border-radius: 14px; padding: 28px 22px; text-align: center; color: #968b81; font-size: 14px;\">No fees match your search.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===================== FOOTER ===================== -->\n    <footer style=\"margin-top: 72px; padding-top: 28px; border-top: 1px solid #ddd5c9;\">\n      <div style=\"font-family: 'Spectral', serif; font-size: 16px; font-weight: 600; margin-bottom: 8px;\">City of Evanston, Wyoming — FY2026–27<\u002Fdiv>\n      <p style=\"font-size: 12.5px; line-height: 1.6; color: #968b81; max-width: 80ch; margin: 0 0 6px;\">Figures are drawn from the City’s own fund statements and audited financial statements for the year ended June 30, 2025. The five-year forecast is a planning tool, not a prediction. This explorer is advisory and does not constitute audited financial statements or an official budget document.<\u002Fp>\n      <p style=\"font-size: 12.5px; line-height: 1.6; color: #968b81; max-width: 80ch; margin: 0;\">Sources: City of Evanston Fund Summary (12 months ending June 30, 2026); Revenues &amp; Expenditures vs Budget, FY2026–27 adopted; ten-year sales &amp; use tax comparison; adopted Fee Schedule. Regional &amp; macro context: U.S. Census, WY Dept. of Workforce Services, WY CREG, FOMC, BLS.<\u002Fp>\n    <\u002Ffooter>\n\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    year: 'budget', showAllRev: false,\n    opGrowthPct: 4, interestPct: -10, royaltyPct: -2, salesPct: 1,\n    feeQuery: '', openGroups: {}, openCats: {}, openFunds: {}\n  };\n\n  toggleGroup = (i) => this.setState(s => ({ openGroups: Object.assign({}, s.openGroups, { [i]: !s.openGroups[i] }) }));\n  toggleCat = (c) => this.setState(s => ({ openCats: Object.assign({}, s.openCats, { [c]: !s.openCats[c] }) }));\n  toggleFund = (i) => this.setState(s => ({ openFunds: Object.assign({}, s.openFunds, { [i]: !s.openFunds[i] }) }));\n\n  D() { return window.EVDATA || {}; }\n\n  componentDidMount() {\n    if (!window.EVDATA) {\n      this._t = setInterval(() => { if (window.EVDATA) { clearInterval(this._t); this.forceUpdate(); } }, 60);\n    }\n    this._onScroll = () => {\n      const scrolled = (window.scrollY || window.pageYOffset || 0) > 360;\n      if (scrolled !== this.state.scrolled) this.setState({ scrolled });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this._onScroll();\n  }\n  componentWillUnmount() {\n    if (this._t) clearInterval(this._t);\n    if (this._onScroll) window.removeEventListener('scroll', this._onScroll);\n  }\n\n  fmt(n) { return '$' + Math.round(n).toLocaleString('en-US'); }\n  fmtM(n) { return '$' + (n / 1e6).toFixed(n >= 1e7 ? 1 : 2) + 'M'; }\n  fmtSign(n) { return (n < 0 ? '\\u2212' : '+') + '$' + Math.abs(Math.round(n)).toLocaleString('en-US'); }\n\n  // blend a hex color toward a target hex by t (0..1)\n  mix(hex, target, t) {\n    const h = (c) => [parseInt(c.slice(1, 3), 16), parseInt(c.slice(3, 5), 16), parseInt(c.slice(5, 7), 16)];\n    const a = h(hex), b = h(target);\n    const r = a.map((v, i) => Math.round(v + (b[i] - v) * t));\n    return 'rgb(' + r[0] + ',' + r[1] + ',' + r[2] + ')';\n  }\n\n  setActual = () => this.setState({ year: 'actual' });\n  setBudget = () => this.setState({ year: 'budget' });\n  toggleAllRev = () => this.setState(s => ({ showAllRev: !s.showAllRev }));\n  setSlider = (key, v) => this.setState({ [key]: +v });\n  resetForecast = () => this.setState({ opGrowthPct: 4, interestPct: -10, royaltyPct: -2, salesPct: 1 });\n  setFeeQuery = (e) => this.setState({ feeQuery: e.target.value });\n\n  computeForecast(D) {\n    const st = this.state;\n    const steadyFor = (s) => {\n      if (s.key === 'interest') return st.interestPct / 100;\n      if (s.key === 'royalty') return st.royaltyPct / 100;\n      if (s.key === 'sales') return st.salesPct / 100;\n      return s.steady;\n    };\n    const rev = []; let prev = {};\n    for (let y = 0; y < 5; y++) {\n      let total = 0; const cur = {};\n      for (const s of D.recurringSources) {\n        const v = (y === 0) ? s.base * (1 + s.adj) : prev[s.name] * (1 + steadyFor(s));\n        cur[s.name] = v; total += v;\n      }\n      rev.push(total); prev = cur;\n    }\n    const op = []; let o = D.opBase; const g = st.opGrowthPct / 100;\n    for (let y = 0; y < 5; y++) { o = o * (1 + g); op.push(o); }\n    const surplus = rev.map((r, i) => r - op[i]);\n    let res = 35973549; const reserve = [];\n    for (let i = 0; i < 5; i++) { res += surplus[i]; reserve.push(res); }\n    return { rev, op, surplus, reserve };\n  }\n\n  renderVals() {\n    const D = this.D();\n    if (!D.revGroups) return {};\n    const st = this.state;\n    const yr = st.year;\n    const pick = (o) => o[yr];\n\n    // hero / toggle\n    const total = D.revGroups.reduce((a, g) => a + pick(g), 0);\n    const max = Math.max.apply(null, D.revGroups.map(pick));\n    const anyOpen = Object.keys(st.openGroups).some(k => st.openGroups[k]);\n    const openIdx = D.revGroups.map((g, i) => st.openGroups[i] ? i : -1).filter(i => i >= 0);\n    let cum = 0; const stops = [];\n    const GAP = 0.5; // degrees-as-% separator between slices\n    const revRows = D.revGroups.map((g, i) => {\n      const amt = pick(g); const p = amt / total * 100; const start = cum; cum += p;\n      const open = !!st.openGroups[i];\n      const lit = !anyOpen || open;\n      const sliceColor = lit ? D.COLORS[i] : this.mix(D.COLORS[i], '#e9e4da', 0.78);\n      // thin neutral separator between slices for definition\n      const s0 = (start + (i === 0 ? 0 : GAP)).toFixed(2);\n      const s1 = cum.toFixed(2);\n      stops.push('#f2f0ea ' + start.toFixed(2) + '% ' + s0 + '%');\n      stops.push(sliceColor + ' ' + s0 + '% ' + s1 + '%');\n      const bd = (D.revBreakdown || {})[g.name] || { note: '', items: [] };\n      return {\n        name: g.name, color: D.COLORS[i], amount: this.fmt(amt), pct: p.toFixed(0) + '%',\n        barPct: (amt / max * 100).toFixed(1) + '%',\n        open: open, chevron: open ? '\\u25be' : '\\u25b8',\n        rowOpacity: lit ? '1' : '0.5',\n        dotRing: open ? '0 0 0 3px ' + this.mix(D.COLORS[i], '#ffffff', 0.55) : 'none',\n        onToggle: () => this.toggleGroup(i), note: bd.note,\n        children: bd.items.map(it => ({ name: it.name, amount: this.fmt(pick(it)) }))\n      };\n    });\n    const donut = 'conic-gradient(' + stops.join(', ') + ')';\n    // center of donut: show highlighted source when exactly one is open\n    let donutLabel = 'Total', donutValue = this.fmt(total), donutSub = this.fmt(total / D.POP) + ' / resident';\n    if (openIdx.length === 1) {\n      const g = D.revGroups[openIdx[0]];\n      donutLabel = g.name; donutValue = this.fmt(pick(g));\n      donutSub = (pick(g) / total * 100).toFixed(0) + '% of revenue';\n    }\n    const revDetailRows = D.revDetail.map(d => ({ name: d.name, amount: this.fmt(pick(d)), pct: (pick(d) / total * 100).toFixed(1) + '%' }));\n\n    const fundRev = (f) => yr === 'budget' ? f.fy27rev : f.fy26rev;\n    const fundExp = (f) => yr === 'budget' ? f.fy27exp : f.fy26exp;\n    const fmax = Math.max.apply(null, D.funds.map(f => Math.max(fundRev(f), fundExp(f))));\n    const fundRows = D.funds.map((f, i) => {\n      const rev = fundRev(f), exp = fundExp(f);\n      const net = rev - exp;\n      const caps = (D.capitalProjects || {})[f.name] || [];\n      const showCaps = yr === 'budget' && caps.length > 0;\n      const capTotal = caps.reduce((a, c) => a + c.cost, 0);\n      const capOpen = !!st.openFunds[i];\n\n      // FY26 actual spending breakdown (departments / capital / grants)\n      const lines = (D.fundSpendingFY26 || {})[f.name] || [];\n      const lineTotal = lines.reduce((a, l) => a + l.amount, 0) || 1;\n      const typeMeta = {\n        operating: { label: 'Department operating budgets', color: '#3f8780' },\n        capital: { label: 'Capital outlay', color: '#c9a96a' },\n        grant: { label: 'Community grants & outside agencies', color: '#8c5a8a' }\n      };\n      const breakdownGroups = ['operating', 'capital', 'grant'].map(t => {\n        const items = lines.filter(l => l.type === t);\n        if (!items.length) return null;\n        const sub = items.reduce((a, l) => a + l.amount, 0);\n        return {\n          label: typeMeta[t].label, color: typeMeta[t].color,\n          subPct: (sub / lineTotal * 100).toFixed(1) + '%', subAmount: this.fmt(sub),\n          items: items.map(l => ({ name: l.name, amount: this.fmt(l.amount), pct: (l.amount / lineTotal * 100).toFixed(1) + '%', barPct: (l.amount / lineTotal * 100).toFixed(1) + '%', color: typeMeta[t].color }))\n        };\n      }).filter(Boolean);\n      const showBreakdown = yr === 'actual' && lines.length > 0;\n\n      return {\n        name: f.name, plain: f.plain, rev: this.fmt(rev), exp: this.fmt(exp),\n        net: this.fmtSign(net), netColor: net >= 0 ? '#3f8780' : '#8c1f2b',\n        revBar: (rev / fmax * 100).toFixed(1) + '%', expBar: (exp / fmax * 100).toFixed(1) + '%',\n        hasCapital: showCaps,\n        capOpen: capOpen, capChevron: capOpen ? '\\u25be' : '\\u25b8',\n        onToggleCap: () => this.toggleFund(i),\n        capLabel: (capOpen ? 'Hide' : 'View') + ' FY27 capital projects (' + caps.length + ')',\n        capProjects: caps.map(c => ({ name: c.name, cost: this.fmt(c.cost) })),\n        capTotal: this.fmt(capTotal),\n        hasBreakdown: showBreakdown,\n        bdOpen: capOpen, bdChevron: capOpen ? '\\u25be' : '\\u25b8',\n        bdLabel: (capOpen ? 'Hide' : 'See') + ' FY26 spending by department (' + lines.length + ' line items)',\n        breakdownGroups\n      };\n    });\n    const fundsYearLabel = yr === 'budget' ? 'FY2026\\u201327 Adopted Budget' : 'FY2025\\u201326 Year-End Actual';\n    const fundsYearShort = yr === 'budget' ? 'FY27 budget (subject to change)' : 'FY26 actual';\n    const isBudget = yr === 'budget';\n    const revLegend = isBudget ? 'Budgeted revenue' : 'Revenue in';\n    const expLegend = isBudget ? 'Budgeted spend' : 'Spending out';\n    const revRowLabel = isBudget ? 'Budgeted' : 'Revenue';\n    const expRowLabel = isBudget ? 'Budgeted' : 'Spending';\n\n    const recRows = D.recovery.map(r => ({ name: r.name, plain: r.plain, pct: r.pct + '%', barPct: Math.min(r.pct, 100) + '%', color: r.pct >= 100 ? '#3f8780' : (r.pct >= 60 ? '#79ad7e' : '#8c1f2b') }));\n\n    // forecast\n    const fc = this.computeForecast(D);\n    const allV = fc.rev.concat(fc.op);\n    let lo = Math.min.apply(null, allV), hi = Math.max.apply(null, allV);\n    const padv = (hi - lo) * 0.18; lo -= padv; hi += padv;\n    const W = 760, H = 300, padL = 56, padR = 24, padT = 24, padB = 44;\n    const X = (i) => padL + i * (W - padL - padR) / 4;\n    const Y = (v) => padT + (1 - (v - lo) / (hi - lo)) * (H - padT - padB);\n    const line = (arr) => arr.map((v, i) => (i === 0 ? 'M' : 'L') + X(i).toFixed(1) + ' ' + Y(v).toFixed(1)).join(' ');\n    const revPath = line(fc.rev), expPath = line(fc.op);\n    const areaPath = line(fc.rev) + ' L' + X(4).toFixed(1) + ' ' + Y(fc.op[4]).toFixed(1) + ' ' + fc.op.slice().reverse().map((v, i) => 'L' + X(4 - i).toFixed(1) + ' ' + Y(v).toFixed(1)).join(' ') + ' Z';\n    const labels = ['FY27', 'FY28', 'FY29', 'FY30', 'FY31'];\n    const xLabels = labels.map((l, i) => ({ x: X(i), label: l }));\n    const revPts = fc.rev.map((v, i) => ({ x: X(i).toFixed(1), y: Y(v).toFixed(1) }));\n    const expPts = fc.op.map((v, i) => ({ x: X(i).toFixed(1), y: Y(v).toFixed(1) }));\n    const grid = [];\n    for (let k = 0; k <= 3; k++) { const v = lo + (hi - lo) * k / 3; grid.push({ y: Y(v).toFixed(1), label: '$' + (v / 1e6).toFixed(1) + 'M' }); }\n    const surplusChips = fc.surplus.map((v, i) => ({ year: labels[i], val: this.fmtSign(v), color: v >= 0 ? '#2f6b72' : '#8c1f2b', bg: v >= 0 ? '#eaf2ee' : '#f7ece8' }));\n\n    // fees — grouped accordions by category\n    const catOrder = ['Licenses & Permits', 'Planning & Zoning', 'Police & Parking', 'Animal Control', 'Records', 'Rentals', 'Cemetery', 'Golf', 'Utilities'];\n    const q = st.feeQuery.trim().toLowerCase();\n    const searching = q.length > 0;\n    let totalMatches = 0;\n    const feeGroups = [];\n    catOrder.forEach(cat => {\n      const items = D.fees.filter(f => f.c === cat && (!q || f.n.toLowerCase().includes(q) || f.c.toLowerCase().includes(q))).map(f => ({ name: f.n, fee: f.f }));\n      if (searching && items.length === 0) return;\n      totalMatches += items.length;\n      const open = searching ? true : !!st.openCats[cat];\n      feeGroups.push({\n        name: cat, count: items.length + (items.length === 1 ? ' fee' : ' fees'),\n        open: open, chevron: open ? '\\u25be' : '\\u25b8',\n        onToggle: () => this.toggleCat(cat), items: items\n      });\n    });\n\n    const onState = '#8c1f2b', onText = '#ffffff', offState = '#ffffff', offText = '#5a514b';\n    return {\n      setActual: this.setActual, setBudget: this.setBudget,\n      floatVisible: !!st.scrolled,\n      floatOpacity: st.scrolled ? '1' : '0',\n      floatPointer: st.scrolled ? 'auto' : 'none',\n      floatTransform: st.scrolled ? 'translateY(0)' : 'translateY(14px)',\n      actualBg: yr === 'actual' ? onState : offState, actualFg: yr === 'actual' ? onText : offText,\n      budgetBg: yr === 'budget' ? onState : offState, budgetFg: yr === 'budget' ? onText : offText,\n      floatActualBg: yr === 'actual' ? '#ffffff' : 'transparent', floatActualFg: yr === 'actual' ? '#15323a' : '#cdded8',\n      floatBudgetBg: yr === 'budget' ? '#ffffff' : 'transparent', floatBudgetFg: yr === 'budget' ? '#15323a' : '#cdded8',\n      yearLabel: yr === 'budget' ? 'FY2026\\u201327 Adopted Budget' : 'FY2025\\u201326 Year-End Actual',\n      heroTotal: this.fmt(total), heroPerResident: this.fmt(total / D.POP),\n      revRows, donut, total: this.fmt(total), perResident: this.fmt(total / D.POP),\n      donutLabel, donutValue, donutSub,\n      showAllRev: st.showAllRev, toggleAllRev: this.toggleAllRev,\n      allRevLabel: st.showAllRev ? 'Hide full breakdown \\u2191' : 'See all 14 revenue sources \\u2193',\n      revDetailRows, fundRows, recRows, fundsYearLabel, fundsYearShort, revLegend, expLegend,\n      fcVB: '0 0 ' + W + ' ' + H, revPath, expPath, areaPath, xLabels, revPts, expPts, grid, surplusChips,\n      surplus27: this.fmtSign(fc.surplus[0]), surplus31: this.fmtSign(fc.surplus[4]),\n      reserve31: this.fmtM(fc.reserve[4]), reserveMult: (fc.reserve[4] / fc.op[4]).toFixed(1),\n      opGrowthPct: st.opGrowthPct, opGrowthLabel: st.opGrowthPct.toFixed(1) + '%',\n      interestPct: st.interestPct, interestLabel: st.interestPct + '%',\n      royaltyPct: st.royaltyPct, royaltyLabel: (st.royaltyPct > 0 ? '+' : '') + st.royaltyPct + '%',\n      salesPct: st.salesPct, salesLabel: (st.salesPct > 0 ? '+' : '') + st.salesPct + '%',\n      setOp: (e) => this.setSlider('opGrowthPct', e.target.value),\n      setInt: (e) => this.setSlider('interestPct', e.target.value),\n      setRoy: (e) => this.setSlider('royaltyPct', e.target.value),\n      setSales: (e) => this.setSlider('salesPct', e.target.value),\n      resetForecast: this.resetForecast,\n      feeQuery: st.feeQuery, setFeeQuery: this.setFeeQuery,\n      feeGroups, noFees: searching && totalMatches === 0\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
